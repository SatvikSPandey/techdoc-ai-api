name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/techdoc-ai-api
            git pull origin main
            docker stop techdoc-api || true
            docker rm techdoc-api || true
            docker build -t techdoc-ai-api .
            docker run -d --env-file .env -p 8000:8000 --name techdoc-api techdoc-ai-api